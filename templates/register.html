{% extends 'base.html' %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Get Started</h2>
            <p>Create a secure account to organize your tasks.</p>
        </div>
        <form action="{{ url_for('auth.register') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-user input-icon"></i>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="password" name="password" placeholder="Create a password" required autocomplete="new-password">
                </div>
            </div>
            
            <button type="submit" class="btn-primary btn-block">
                <span>Sign Up</span>
                <i class="fa-solid fa-user-plus"></i>
            </button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Log in here</a></p>
        </div>
    </div>
</div>
{% endblock %}
