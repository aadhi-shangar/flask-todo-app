{% extends 'base.html' %}

{% block content %}
<div class="form-wrapper">
    <div class="form-card">
        <div class="form-header">
            <a href="{{ url_for('index') }}" class="back-link">
                <i class="fa-solid fa-arrow-left-long"></i> Back to Workspace
            </a>
            <h2>{{ action }} Task</h2>
            <p>Fill in the details below to organize your work.</p>
        </div>
        
        <form action="" method="POST" class="todo-main-form">
            <div class="form-group">
                <label for="title">Task Title <span class="required-star">*</span></label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-heading input-icon"></i>
                    <input type="text" id="title" name="title" value="{{ todo.title if todo else '' }}" placeholder="What needs to be done?" required autofocus>
                </div>
            </div>
            
            <div class="form-group">
                <label for="due_date">Due Date</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-calendar input-icon"></i>
                    <input type="date" id="due_date" name="due_date" value="{{ todo.due_date if todo and todo.due_date else '' }}">
                </div>
            </div>
            
            <div class="form-group">
                <label for="description">Description</label>
                <div class="input-wrapper textarea-wrapper">
                    <i class="fa-solid fa-align-left input-icon"></i>
                    <textarea id="description" name="description" rows="4" placeholder="Add some notes, subtasks, or context...">{{ todo.description if todo else '' }}</textarea>
                </div>
            </div>

            {% if action == "Edit" %}
                <div class="form-group checkbox-form-group">
                    <label class="custom-checkbox-container">
                        <input type="checkbox" name="completed" {% if todo and todo.completed %}checked{% endif %}>
                        <span class="checkmark"></span>
                        <span class="checkbox-label">Mark as completed</span>
                    </label>
                </div>
            {% endif %}
            
            <div class="form-actions-row">
                <a href="{{ url_for('index') }}" class="btn-secondary">Cancel</a>
                <button type="submit" class="btn-primary">
                    <span>{{ action }} Task</span>
                    <i class="fa-solid fa-circle-check"></i>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
